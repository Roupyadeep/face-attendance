{% extends "base.html" %}

{% block content %}
<div class="row g-4">
    <div class="col-12">
        <h1 class="mb-4">System <span class="accent-text">Dashboard</span></h1>
    </div>
    
    <!-- Stats Cards -->
    <div class="col-md-3">
        <div class="glass-card stat-card">
            <div class="d-flex justify-content-between align-items-start mb-3">
                <i class="fa-solid fa-users fs-4 accent-text"></i>
                <div class="stat-label">Total Users</div>
            </div>
            <div class="stat-value" id="stat-total-users">0</div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="glass-card stat-card">
            <div class="d-flex justify-content-between align-items-start mb-3">
                <i class="fa-solid fa-user-check fs-4 text-success"></i>
                <div class="stat-label">Present Today</div>
            </div>
            <div class="stat-value" id="stat-present-today">0</div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="glass-card stat-card">
            <div class="d-flex justify-content-between align-items-start mb-3">
                <i class="fa-solid fa-user-xmark fs-4 text-danger"></i>
                <div class="stat-label">Absent Today</div>
            </div>
            <div class="stat-value" id="stat-absent-today">0</div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="glass-card stat-card">
            <div class="d-flex justify-content-between align-items-start mb-3">
                <i class="fa-solid fa-chart-line fs-4 text-info"></i>
                <div class="stat-label">Attendance Rate</div>
            </div>
            <div class="stat-value"><span id="stat-attendance-rate">0</span>%</div>
        </div>
    </div>

    <!-- Recent Activity and User Management -->
    <div class="col-md-7 mt-5">
        <div class="glass-card">
            <h4 class="mb-4">Recent <span class="accent-text">Activity</span></h4>
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Roll</th>
                            <th>Status</th>
                            <th>Time</th>
                        </tr>
                    </thead>
                    <tbody id="recent-activity-body">
                        <!-- Populated by JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="col-md-5 mt-5">
        <div class="glass-card">
            <h4 class="mb-4">Manage <span class="accent-text">Users</span></h4>
            <div class="table-responsive" style="max-height: 400px; overflow-y: auto;">
                <table class="table table-sm">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Roll</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="users-list-body">
                        <!-- Populated by JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        fetchStats();
        fetchUsers();
        // Refresh every 30 seconds
        setInterval(() => {
            fetchStats();
            fetchUsers();
        }, 30000);
    });

    async function fetchStats() {
        try {
            const response = await fetch('/api/dashboard-stats');
            const data = await response.json();
            
            document.getElementById('stat-total-users').innerText = data.total_users;
            document.getElementById('stat-present-today').innerText = data.present_today;
            document.getElementById('stat-absent-today').innerText = data.absent_today;
            document.getElementById('stat-attendance-rate').innerText = data.attendance_pct;
            
            const body = document.getElementById('recent-activity-body');
            body.innerHTML = '';
            
            data.recent_activity.forEach(record => {
                const row = `
                    <tr>
                        <td>${record.name}</td>
                        <td>${record.roll}</td>
                        <td class="${record.status === 'Present' ? 'status-present' : 'status-absent'}">
                            ${record.status}
                        </td>
                        <td>${record.timestamp.split(' ')[1]}</td>
                    </tr>
                `;
                body.innerHTML += row;
            });
        } catch (error) {
            console.error('Error fetching stats:', error);
        }
    }

    async function fetchUsers() {
        try {
            const response = await fetch('/api/users');
            const data = await response.json();
            const body = document.getElementById('users-list-body');
            body.innerHTML = '';
            
            data.forEach(user => {
                const row = `
                    <tr>
                        <td>${user.name}</td>
                        <td>${user.roll}</td>
                        <td>
                            <button onclick="deleteUser(${user.id})" class="btn btn-sm btn-outline-danger">Delete</button>
                        </td>
                    </tr>
                `;
                body.innerHTML += row;
            });
        } catch (error) {
            console.error('Error fetching users:', error);
        }
    }

    async function deleteUser(userId) {
        if (!confirm('Are you sure you want to delete this user? All their attendance records and photos will be removed.')) {
            return;
        }
        
        try {
            const response = await fetch(`/api/users/delete/${userId}`, { method: 'DELETE' });
            if (response.ok) {
                showToast('User deleted successfully', 'success');
                fetchStats();
                fetchUsers();
            } else {
                const data = await response.json();
                alert(data.error || 'Failed to delete user');
            }
        } catch (error) {
            console.error('Error deleting user:', error);
        }
    }
</script>
{% endblock %}
